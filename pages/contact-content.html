<!-- Contact Hero Section -->
<section class="contact-hero">
    <div class="container">
        <h1>Contact Us</h1>
        <p>{{CONTACT_HERO_SUBTITLE}}</p>
    </div>
</section>

<!-- Contact Content -->
<section class="contact-content">
    <div class="container">

        <!-- Contact Form Section -->
        <div class="contact-form-section">
            <h2>We'd love to hear from you!</h2>
            <p>{{CONTACT_INTRO}}</p>
            <br>
        </div>

        <!-- Contact Information  -->
        <div class="contact-info">
            <h2>Contact Information</h2>

            <div class="contact-item">
                <div class="contact-icon">📧</div>
                <div class="contact-details">
                    <h3>Email</h3>
                    <p id="email-config">contact@{{SITE_HOST}}</p>
                </div>
            </div>
            <div class="contact-item">
                <div class="contact-icon">🌐</div>
                <div class="contact-details">
                    <h3>Website</h3>
                    <p><a href="{{SITE_URL}}">www.{{SITE_HOST}}</a></p>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- FAQ Section -->
<section class="faq-section">
    <div class="container">
        <h2>Frequently Asked Questions</h2>
        <div class="faq-grid">
            {{CONTACT_FAQ_HTML}}
        </div>
    </div>
</section>
